name: Build and push Docker image

on:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - source/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Extract Docker image tag from package.json
        id: version
        run: |
          VERSION=$(grep -Po '(?<="version": ").*(?=")' package.json)
          TAG=v$(echo "$VERSION" | sed -r 's/^([0-9]+[.][0-9]+).*/\1/')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Set package visibility to public
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if gh api /orgs/$OWNER >/dev/null 2>&1; then
            gh api -X PATCH /orgs/$OWNER/packages/container/$REPO -f visibility=public
          else
            gh api -X PATCH /user/packages/container/$REPO -f visibility=public
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
